method: baseline   # baseline | grl | contrastive | combined

data:
  annotations_file: "path/to/all_samples.csv"
  spectrogram_dir: "path/to/hr_spectrograms"
  language_mode: "native"   # native | english | all

training:
  batch_size: 16
  num_epochs: 15
  learning_rate: 0.0003
  num_workers: 4
  pretrained: true

model:
  num_classes: 2
  num_domains: 3
  dropout: 0.5
  projection_dim: 128
  lambda_grl: 1.0

loss:
  alpha: 0.5
  beta: 0.5
  gamma: 2.0
  temperature: 0.7

protocols:
  - train: ["CHINESE", "MALAY"]
    test: ["HINDI"]
  - train: ["CHINESE", "HINDI"]
    test: ["MALAY"]
  - train: ["MALAY", "HINDI"]
    test: ["CHINESE"]
